name: Build Universal SAF Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 使用 Gradle 8.5 配合标准结构
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      # 编译 app 模块
      - name: Build with Gradle
        run: gradle :app:assembleRelease --no-daemon

      - name: Prepare Signing Tools
        run: sudo apt-get update && sudo apt-get install -y zipalign

      - name: Align and Sign APK
        run: |
          # 在新结构下查找生成的 APK
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*-unsigned.apk" | head -n 1)
          
          if [ -z "$UNSIGNED_APK" ]; then
            echo "Error: APK not found"
            exit 1
          fi
          
          # 1. Zipalign 对齐
          zipalign -v 4 "$UNSIGNED_APK" plugin_aligned.apk
          
          # 2. 签名 (假设 key.jks 还在根目录)
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks key.jks \
            --ks-key-alias "${{ secrets.JKS_ALIAS }}" \
            --ks-pass pass:"${{ secrets.JKS_PASSWORD }}" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out SAF_Plugin_Universal.apk plugin_aligned.apk
          
          # 验证
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v SAF_Plugin_Universal.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Universal-SAF-Module
          path: SAF_Plugin_Universal.apk
