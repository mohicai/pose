      # 编译命令改为指向 app 模块
      - name: Build with Gradle
        run: gradle :app:assembleRelease --no-daemon

      - name: Align and Sign APK
        run: |
          # 路径变更为 app 模块的输出目录
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*-unsigned.apk" | head -n 1)
          
          zipalign -v 4 "$UNSIGNED_APK" plugin_aligned.apk
          
          # 签名 (假设 key.jks 还在根目录)
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks key.jks \
            --ks-key-alias "${{ secrets.JKS_ALIAS }}" \
            --ks-pass pass:"${{ secrets.JKS_PASSWORD }}" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out SAF_Plugin_Universal.apk plugin_aligned.apk
