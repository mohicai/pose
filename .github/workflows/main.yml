name: Build Universal SAF Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 关键步骤：强制使用 Gradle 8.5 避开 9.4.1 的严格依赖校验
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      # 编译 Release APK
      # 使用 --no-daemon 减少内存占用，配合 build.gradle 中的任务挂钩
      - name: Build with Gradle
        run: gradle assembleRelease --no-daemon

      - name: Prepare Signing Tools
        run: sudo apt-get update && sudo apt-get install -y zipalign

      - name: Align and Sign APK
        run: |
          # 自动寻找生成的未签名 APK
          UNSIGNED_APK=$(find . -name "*release-unsigned.apk" | head -n 1)
          
          if [ -z "$UNSIGNED_APK" ]; then
            echo "错误: 未找到生成的 APK 文件"
            exit 1
          fi
          
          # 1. Zipalign 4字节对齐（解决安装不兼容的关键）
          zipalign -v 4 "$UNSIGNED_APK" plugin_aligned.apk
          
          # 2. 使用根目录下的 key.jks 进行签名
          # 请确保在 GitHub Secrets 中配置了对应的变量
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks key.jks \
            --ks-key-alias "${{ secrets.JKS_ALIAS }}" \
            --ks-pass pass:"${{ secrets.JKS_PASSWORD }}" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out SAF_Plugin_Universal.apk plugin_aligned.apk
          
          # 验证签名
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v SAF_Plugin_Universal.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Universal-SAF-Module
          path: SAF_Plugin_Universal.apk
