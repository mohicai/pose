name: Build Universal SAF Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      # 编译生成未签名的 Release APK
      - name: Build with Gradle
        run: ./gradlew assembleRelease || gradle assembleRelease

      - name: Prepare Signing Tools
        run: sudo apt-get install -y zipalign

      - name: Align and Sign APK
        run: |
          # 找到编译出的 APK
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          
          # 1. Zipalign 对齐
          zipalign -v 4 "$UNSIGNED_APK" plugin_aligned.apk
          
          # 2. 使用根目录的 key.jks 签名 (需在 Secrets 中配置密码)
          # 注意：这里的 --ks key.jks 指向你放在根目录的文件
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks key.jks \
            --ks-key-alias "mohic" \
            --ks-pass pass:"monchan" \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out SAF_Plugin_Universal.apk plugin_aligned.apk

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Universal-SAF-Module
          path: SAF_Plugin_Universal.apk
