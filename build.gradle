buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // 使用更稳定的 AGP 版本
        classpath 'com.android.tools.build:gradle:8.2.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.application'

android {
    namespace 'com.universal.saf.plugin'
    compileSdk 34

    defaultConfig {
        applicationId "com.universal.saf.plugin"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    sourceSets {
        main {
            java.srcDirs = ['.']
            manifest.srcFile 'AndroidManifest.xml'
        }
    }
}

// 核心修复：解决 Gradle 9.x 的隐式依赖校验错误
tasks.matching { it.name.startsWith("compile") && it.name.contains("JavaWithJavac") }.all { task ->
    // 强制声明任务顺序，解决 desugar 和 duplicateClasses 的校验问题
    task.mustRunAfter(tasks.matching { it.name.contains("desugar") })
    task.mustRunAfter(tasks.matching { it.name.contains("check") && it.name.contains("DuplicateClasses") })
}
