buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // 添加 Android Gradle Plugin 依赖和版本
        classpath 'com.android.tools.build:gradle:8.2.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.application'

android {
    namespace 'com.universal.saf.plugin'
    compileSdk 34

    defaultConfig {
        applicationId "com.universal.saf.plugin"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    // 指定源码位置，确保能找到你的 SAFProvider.java
    sourceSets {
        main {
            java.srcDirs = ['.'] 
            manifest.srcFile 'AndroidManifest.xml'
        }
    }
}
